<style>
  :root {

    --bg-elev: #ffffff;
    --text: #1a1d24;
    --text-mute: #5b6471;
    --border: #e3e6ec;
    --accent: #2563eb;
    --accent-soft: #e7efff;
    --tag-bg: #eef1f6;
    --tag-text: #424a5a;
    --code-bg: #0f172a;
    --code-text: #e2e8f0;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(15,23,42,.05);
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --bg-elev: #161a21;
      --text: #e7ebf3;
      --text-mute: #98a1b0;
      --border: #232934;
      --accent: #6aa3ff;
      --accent-soft: #1a2740;
      --tag-bg: #232934;
      --tag-text: #c7cfdc;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static !important; height: auto !important; border-right: 0 !important; border-bottom: 1px solid var(--border); }
    .sidebar-inner { max-height: 50vh; overflow-y: auto; }
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-inner { padding: 20px 16px; }
  .brand {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 4px;
    letter-spacing: -.01em;
  }
  .brand small { color: var(--text-mute); font-weight: 500; font-size: 12px; display: block; margin-top: 2px; }
  .nav { list-style: none; padding: 0; margin: 14px 0 0; }
  .nav li a {
    display: block;
    padding: 7px 10px;
    border-radius: 6px;
    color: var(--text);
    font-size: 13.5px;
    border: 1px solid transparent;
  }
  .nav li a:hover { background: var(--tag-bg); text-decoration: none; }
  .nav li a.active { background: var(--accent-soft); color: var(--accent); border-color: transparent; }

  /* Main */
  main { padding: 28px clamp(16px, 4vw, 56px); max-width: 1100px; }
  .page-head {
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
    margin-bottom: 24px;
  }

    margin: 0 0 6px;
    font-size: clamp(22px, 3vw, 28px);
    letter-spacing: -.02em;
  }
  .page-head p { color: var(--text-mute); margin: 0; font-size: 14px; }

  /* Search bar */
  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 18px 0 6px;
    align-items: center;
  }
  .search {
    flex: 1 1 300px;
    position: relative;
  }
  .search input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-elev);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search::before {
    content: "";
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    border: 2px solid var(--text-mute);
    border-radius: 50%;
  }
  .search::after {
    content: "";
    position: absolute;
    left: 26px; top: 22px;
    width: 8px; height: 2px;
    background: var(--text-mute);
    transform: rotate(45deg);
  }
  .meta {
    color: var(--text-mute);
    font-size: 12.5px;
  }

  .tagbar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin: 12px 0 8px;
  }
  .tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-size: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: background .12s, color .12s;

  .tag.active { background: var(--accent); color: #fff; }
  .tagbar .clear {

    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-mute);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
  }

    padding: 22px 22px 18px;
    margin: 16px 0;

    font-size: 18px;
    letter-spacing: -.01em;
  }
  .crumb {
    color: var(--text-mute);
    font-size: 12.5px;
    font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;

  .desc {
    white-space: pre-wrap;
    color: var(--text);
    font-size: 14.5px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 10px 0 12px;
  }
  .images {
    display: grid;
    gap: 10px;
    margin-top: 10px;
  }
  .images img {
    width: 100%;
    height: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    cursor: zoom-in;
    display: block;
  }
  .section-tags {
    display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 4px;
  }
  .section-tags .tag { cursor: pointer; }

  .empty {
    padding: 40px 16px;
    text-align: center;
    color: var(--text-mute);
    border: 1px dashed var(--border);
    border-radius: 12px;
    margin-top: 20px;
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.86);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
    padding: 24px;
    cursor: zoom-out;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 96vw;
    max-height: 92vh;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }

  /* Footer */
  footer {
    color: var(--text-mute);
    font-size: 12px;
    padding: 24px 0 8px;
    border-top: 1px solid var(--border);
    margin-top: 28px;
  }

  /* Highlight match */
  mark {
    background: #fde68a;
    color: #1a1d24;
    padding: 0 2px;
    border-radius: 3px;
  }
  @media (prefers-color-scheme: dark) {
    mark { background: #facc15; color: #1a1d24; }
  }
</style>

<script>
(function(){
  const data = JSON.parse(document.getElementById('data').textContent);
  const sectionsEl = document.getElementById('sections');
  const navEl = document.getElementById('nav');
  const tagbarEl = document.getElementById('tagbar');
  const qEl = document.getElementById('q');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');
  const updatedEl = document.getElementById('updated');
  const totalEl = document.getElementById('total');
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');

  // collect tags
  const tagSet = new Set();
  data.sections.forEach(s => s.tags.forEach(t => tagSet.add(t)));
  const allTags = Array.from(tagSet).sort();

  // build tagbar
  const activeTags = new Set();
  allTags.forEach(t => {
    const el = document.createElement('span');
    el.className = 'tag';
    el.textContent = '#' + t;
    el.dataset.tag = t;
    el.addEventListener('click', () => {
      if (activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
      el.classList.toggle('active');
      render();
    });
    tagbarEl.appendChild(el);
  });
  const clearBtn = document.createElement('button');
  clearBtn.className = 'clear';
  clearBtn.textContent = '필터 초기화';
  clearBtn.addEventListener('click', () => {
    activeTags.clear();
    qEl.value = '';
    document.querySelectorAll('.tagbar .tag.active').forEach(e => e.classList.remove('active'));
    render();
  });
  tagbarEl.appendChild(clearBtn);

  // build nav
  data.sections.forEach(s => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + s.id;
    a.textContent = s.title;
    a.dataset.id = s.id;
    li.appendChild(a);
    navEl.appendChild(li);
  });

  // build sections
  data.sections.forEach(s => {
    const card = document.createElement('section');
    card.className = 'card';
    card.id = s.id;
    card.dataset.title = s.title;
    card.dataset.tags = s.tags.join(',');
    card.dataset.path = s.path;
    card.dataset.desc = s.desc;

    const h2 = document.createElement('h2');
    h2.textContent = s.title;
    card.appendChild(h2);

    const cr = document.createElement('div');
    cr.className = 'crumb';
    cr.textContent = s.path;
    card.appendChild(cr);

    const tags = document.createElement('div');
    tags.className = 'section-tags';
    s.tags.forEach(t => {
      const tg = document.createElement('span');
      tg.className = 'tag';
      tg.textContent = '#' + t;
      tg.addEventListener('click', () => {
        if (activeTags.has(t)) activeTags.delete(t); else activeTags.add(t);
        document.querySelectorAll('.tagbar .tag').forEach(e => {
          if (e.dataset.tag === t) e.classList.toggle('active');
        });
        render();
        window.scrollTo({top: 0, behavior: 'smooth'});
      });
      tags.appendChild(tg);
    });
    card.appendChild(tags);

    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = s.desc;
    card.appendChild(desc);

    if (s.images && s.images.length) {
      const imgs = document.createElement('div');
      imgs.className = 'images';
      s.images.forEach(src => {
        const im = document.createElement('img');
        im.src = 'images/' + src;
        im.alt = s.title;
        im.loading = 'lazy';
        im.addEventListener('click', () => {
          lbImg.src = im.src;
          lb.classList.add('show');
        });
        imgs.appendChild(im);
      });
      card.appendChild(imgs);
    }

    sectionsEl.appendChild(card);
  });

  lb.addEventListener('click', () => lb.classList.remove('show'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('show'); });

  function escapeReg(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
  function highlight(el, text, q) {
    if (!q) { el.textContent = text; return; }
    const re = new RegExp(escapeReg(q), 'gi');
    el.innerHTML = text.replace(re, m => '<mark>' + m + '</mark>');
  }

  function render(){
    const q = qEl.value.trim();
    const lq = q.toLowerCase();
    let visible = 0;
    document.querySelectorAll('section.card').forEach(card => {
      const title = card.dataset.title;
      const tags = card.dataset.tags;
      const path = card.dataset.path;
      const desc = card.dataset.desc;
      const haystack = (title + ' ' + tags + ' ' + path + ' ' + desc).toLowerCase();
      const matchQ = !lq || haystack.includes(lq);
      const matchTags = activeTags.size === 0 || Array.from(activeTags).every(t => tags.split(',').includes(t));
      const show = matchQ && matchTags;
      card.style.display = show ? '' : 'none';
      if (show) visible++;
      // highlight
      if (show) {
        highlight(card.querySelector('h2'), title, q);
        highlight(card.querySelector('.desc'), desc, q);
      }
    });
    countEl.textContent = visible + ' / ' + data.sections.length + ' 항목';
    emptyEl.style.display = visible === 0 ? '' : 'none';
    // nav active filter visual
    const visibleIds = new Set();
    document.querySelectorAll('section.card').forEach(c => { if (c.style.display !== 'none') visibleIds.add(c.id); });
    document.querySelectorAll('#nav a').forEach(a => {
      a.style.opacity = visibleIds.has(a.dataset.id) ? '1' : '0.35';
    });
  }

  qEl.addEventListener('input', render);
  qEl.addEventListener('keydown', e => { if (e.key === 'Escape') { qEl.value = ''; render(); }});

  // scrollspy active
  const obs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.dataset.id === en.target.id));
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });
  document.querySelectorAll('section.card').forEach(c => obs.observe(c));

  updatedEl.textContent = data.updated;
  totalEl.textContent = data.sections.length;
  render();
})();
</script>
</body>
</html>
